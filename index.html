<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pinterest Clone</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">
  
  <link rel="stylesheet" href="./src/css/tokens.css">
  <link rel="stylesheet" href="./src/css/base.css">
  <link rel="stylesheet" href="./src/css/header.css">
  <link rel="stylesheet" href="./src/css/gallery.css">
  <link rel="stylesheet" href="./src/css/button.css">
  <link rel="stylesheet" href="./src/css/navigation.css">
  <link rel="stylesheet" href="./src/css/utilities.css">
</head>

<body>
  <header class="header" id="header">

    <div class="header-left">
      <a href="#" id="app-logo" class="logo" aria-label="Gallery Home">
        <img src="./src/assets/images/pintrest-logo.png" alt="Logo">
      </a>
      <nav class="main-nav">
        <ul>
          <li><a href="#header" class="btn btn-pill btn-dark nav-link nav-link-active">Inicio</a></li>
          <li><a href="#header" class="btn btn-pill">Explorar</a></li>
          <li><a href="#header" class="btn btn-pill">Crear</a></li>
        </ul>
      </nav>
    </div>


    <div class="search-container">
      <label for="search-box" class="sr-only">Buscar en Galería </label>
      <div class="search-input-wrapper">
        <img 
          src="./src/assets/images/search-icon.png" 
          alt="" 
          aria-hidden="true" 
          class="search-icon">
        <input 
          type="text" 
          id="search-box" 
          class="search-input" 
          placeholder="Buscar">
      </div>
    </div>

    <div class="header-right">
      <!-- Bell Icon Button -->
      <button class="icon-button" aria-label="Ver notificaciones">
        <img src="./src/assets/images/bell-svg.svg" alt="bell icon">
      </button>
      <!-- Blurb Icon Button -->
      <button class="icon-button" aria-label="Abrir mensajes">
        <img src="./src/assets/images/blurb-svg.svg " alt="blurb icon">
      </button>
    </div>

    <a 
      href="#header" 
      class="profile-circle" 
      aria-label="Ver perfil de usuario">
      <span class="profile-text">CT</span>
    </a>
  </header>

  <main class="gallery-container" id="image-gallery">
  </main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
