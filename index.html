<!-- Main document: defines metadata and mount points populated by src/app.js. -->
<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.ico"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary SEO metadata -->
  <title>Galería Estilo Pinterest</title>
  
  <meta name="description"
    content="Galería de imágenes inspirada en Pinterest, creada con Vite, JavaScript, HTML y CSS e integrada con la API de Unsplash." />
  
  <meta name="keywords"
    content="Pinterest-style gallery, image gallery, Unsplash API, Vite project, JavaScript project, HTML, CSS" />
  
  <meta name="author" content="GabrielaH" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#ffffff" />
  
  <!-- Optional but recommended -->
  <link rel="canonical" href="https://your-domain.com/" />
  
  <!-- Open Graph metadata for link previews -->
  <meta property="og:title" content="Pinterest-style Image Gallery" />
  
  <meta property="og:description"
    content="A responsive image gallery inspired by Pinterest, built with Vite, JavaScript, HTML and CSS, using the Unsplash API." />
  
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://your-domain.com/" />
  <meta property="og:image" content="https://your-domain.com/preview-image.jpg" />
  <meta property="og:image:alt" content="Preview of a Pinterest-style image gallery using Unsplash images" />
  <meta property="og:site_name" content="Pinterest-style Image Gallery" />
  
  <!-- Twitter/X card metadata for social previews -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Pinterest-style Image Gallery" />
  
  <meta name="twitter:description"
    content="A responsive image gallery inspired by Pinterest, built with Vite, JavaScript, HTML and CSS, using the Unsplash API." />
  
  <meta name="twitter:image" content="https://your-domain.com/preview-image.jpg" />
  <meta name="twitter:image:alt" content="Preview of a Pinterest-style image gallery using Unsplash images" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">
  
</head>

<body>
  <!-- Replaced by the header component during application startup -->
  <div id="header-root"></div>

  <!-- Dynamic gallery populated by src/app.js -->
  <div id="gallery-root"></div>

  <!-- Application entry point -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
