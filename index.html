<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pinterest Clone</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet">
  
  <link rel="stylesheet" href="./src/css/variables.css">
  <link rel="stylesheet" href="./src/css/style.css">
  <link rel="stylesheet" href="./src/css/header.css">
  <link rel="stylesheet" href="./src/css/gallery.css">
  <link rel="stylesheet" href="./src/css/button.css">
  <link rel="stylesheet" href="./src/css/navigation.css">
  <link rel="stylesheet" href="./src/css/utilities.css">
</head>

<body>
  <header class="header" id="header">

    <a 
      href="#" 
      id="app-logo"
      class="logo" 
      aria-label="Gallery Home">
      <img src="./src/assets/images/pintrest-logo.png" alt="Logo">
    </a>

    <nav class="hidden">
      <a href="#header" class="">Inicio</a>
      <a href="#header" class="">Explorar</a>
      <a href="#header" class="">Crear</a>
    </nav>

    <div class="search-container">
      <label for="search-box" class="sr-only">Buscar en Galería </label>
      <div class="search-input-wrapper">
        <img 
          src="./src/assets/images/search-icon.png" 
          alt="" 
          aria-hidden="true" 
          class="search-icon">
        <input 
          type="text" 
          id="search-box" 
          class="search-input" 
          placeholder="Buscar">
      </div>
    </div>

    <div class="header-right hidden">
      <img src="./src/assets/images/bell-svg.svg" alt="bell icon">
      <img src="./src/assets/images/blurb-svg.svg " alt="blurb icon">
    </div>

    <a 
      href="#header" 
      class="profile-circle" 
      aria-label="Ver perfil de usuario">
      <span class="profile-text">CT</span>
    </a>
  </header>

  <main class="gallery-container" id="image-gallery">
  </main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
